<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Logs – SAGS</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .dl-page { max-width: 520px; margin: 48px auto; padding: 0 16px; }
    .dl-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .dl-card h2 { margin: 0 0 24px; font-size: 1.25rem; font-weight: 700; color: #232629; }
    .dl-field { margin-bottom: 20px; }
    .dl-field label { display: block; font-size: .82rem; font-weight: 600; color: #4b5b76; margin-bottom: 6px; }
    .dl-field select, .dl-field input[type="date"] {
      width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
      font-size: .9rem; color: #232629; background: #f8fafc; box-sizing: border-box;
    }
    .dl-field select:focus, .dl-field input[type="date"]:focus {
      outline: none; border-color: #FF7733; box-shadow: 0 0 0 3px rgba(255,119,51,.15);
    }
    #dl-status { margin-top: 12px; font-size: .85rem; min-height: 20px; }
    #dl-status.ok { color: #16a34a; }
    #dl-status.error { color: #dc2626; }
  </style>
</head>
<body>
  <nav class="app-nav">
    <div class="app-brand">
      <div class="app-logo">PE</div>
      <div>
        <span class="app-name">Interactive Smart Assembly Guidance System</span>
        <span class="app-tagline">· MVIIS ·</span>
      </div>
    </div>
    <ul class="app-nav-links">
      <li><a class="app-nav-link" href="/recipe-management">Recipes</a></li>
      <li><a class="app-nav-link" href="/configure">Configure</a></li>
      <li><a class="app-nav-link" href="/system-settings">System</a></li>
    </ul>
  </nav>

  <div class="dl-page">
    <div class="dl-card">
      <h2>Download Logs</h2>

      <div class="dl-field">
        <label for="log-type">Choose Log</label>
        <select id="log-type">
          <option value="system">System Log</option>
          <option value="conduit">Conduit Log</option>
          <option value="assy">Assy Log</option>
        </select>
      </div>

      <div class="dl-field">
        <label for="start-date">Start Date</label>
        <input type="date" id="start-date" />
      </div>

      <div class="dl-field">
        <label for="end-date">End Date</label>
        <input type="date" id="end-date" />
      </div>

      <button id="download-logs-btn" class="primary" style="width:100%;margin-top:4px;">↓ Download</button>
      <p id="dl-status"></p>
    </div>
  </div>

  <div id="app-loader" style="position:fixed;inset:0;z-index:9999;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;">
    <div style="font-size:2rem;font-weight:800;color:#232629;letter-spacing:-.5px;">Interactive Smart Assembly Guidance System</div>
    <div style="margin-top:10px;color:#232629;opacity:.55;font-size:1rem;">· MVIIS ·</div>
    <div style="margin-top:24px;width:40px;height:40px;border:4px solid rgba(35,38,41,.15);border-top-color:#FF7733;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <footer style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:#232629;color:rgba(255,255,255,.55);font-size:.7rem;text-align:center;padding:.45rem 1rem;letter-spacing:.02em;">
    Solution developed &amp; created by <strong style="color:#FF7733;">Melvin</strong> &amp; <strong style="color:#FF7733;">Venfra Innovative Industrial Solutions</strong> &mdash; MVIIS &copy; 2021
  </footer>
  <script src="/static/download_logs.js"></script>
  <script src="/static/nav_loader.js"></script>
  <script src="/static/idle_logout.js"></script>
</body>
</html>
