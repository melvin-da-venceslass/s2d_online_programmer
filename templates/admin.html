<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin Console</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <div id="login-shell" class="login-shell">
    <section class="login-center-card">
      <div class="login-card-header">
        <div class="login-header-brand">
          <div class="login-header-logo">PE</div>
          <div>
            <span class="login-header-appname">Program Editor</span>
            <span class="login-header-orgtag">SAGS · MVIIS</span>
          </div>
        </div>
      </div>
      <div class="login-card-body">
        <p class="kicker">Authentication Required</p>
        <h1 class="login-title">Sign In</h1>
        <p class="login-subtitle">Enter your credentials to continue. Sessions expire after 30 minutes.</p>
        <div id="bootstrap-wrap" class="stack"></div>
        <div id="login-wrap" class="stack"></div>
        <p id="auth-status" class="status"></p>
      </div>
    </section>
  </div>

  <div id="admin-dashboard" style="display:none;">
    <nav class="app-nav">
      <div class="app-brand">
        <div class="app-logo">PE</div>
        <div>
          <span class="app-name">Program Editor</span>
          <span class="app-tagline">SAGS · MVIIS</span>
        </div>
      </div>
      <ul class="app-nav-links">
        <li><a class="app-nav-link" href="/" id="nav-home-link">Home</a></li>
        <li><a class="app-nav-link" href="/manage-recipe" id="nav-manage-recipe-link">Recipies Records</a></li>
        <li><a class="app-nav-link" href="/cook-recipie" id="nav-editor-link">Cook Recipie</a></li>
        <li><a class="app-nav-link is-active" href="/admin">Administration</a></li>
      </ul>
      <div class="app-nav-user">
        <span id="admin-nav-user" class="nav-user-label">—</span>
        <button id="logout-btn" class="btn ghost">Sign out</button>
      </div>
    </nav>

    <main class="shell-grid">

      <section class="panel" id="create-panel">
        <div class="panel-head">
          <h2 id="create-header">Create &amp; Map</h2>
        </div>
        <nav class="tab-bar" id="form-tabs" role="tablist" aria-label="Entity type">
          <button class="tab-btn is-active" data-tab="org"     type="button">Org</button>
          <button class="tab-btn"           data-tab="branch"  type="button">Branch</button>
          <button class="tab-btn"           data-tab="project" type="button">Project</button>
          <button class="tab-btn"           data-tab="line"    type="button">Line</button>
          <button class="tab-btn"           data-tab="station" type="button">Station</button>
          <button class="tab-btn"           data-tab="user"    type="button">User</button>
          <button class="tab-btn"           data-tab="device"  type="button">Device</button>
        </nav>
        <div class="tab-panes">

          <form id="org-form" class="form-card tab-pane is-active" data-tab-pane="org">
            <label class="field-label">Company name
              <input name="name" placeholder="e.g. Sanmina Corp" required />
            </label>
            <label class="field-label">ORG code
              <input name="code" placeholder="e.g. SAN" required />
            </label>
            <button class="btn primary" type="submit">Create Organization</button>
          </form>

          <form id="branch-form" class="form-card tab-pane" data-tab-pane="branch">
            <label class="field-label">Organization
              <select name="organization_id" required></select>
            </label>
            <label class="field-label">Branch / Plant name
              <input name="name" placeholder="e.g. Monterrey Plant" required />
            </label>
            <label class="field-label">Branch code
              <input name="code" placeholder="e.g. MTY" required />
            </label>
            <button class="btn primary" type="submit">Create Branch</button>
          </form>

          <form id="project-form" class="form-card tab-pane" data-tab-pane="project">
            <label class="field-label">Organization
              <select name="organization_id" required></select>
            </label>
            <label class="field-label">Branch
              <select name="branch_id" required></select>
            </label>
            <label class="field-label">Project name
              <input name="name" placeholder="e.g. PCB Assembly" required />
            </label>
            <label class="field-label">Project code
              <input name="code" placeholder="e.g. PCBA" required />
            </label>
            <button class="btn primary" type="submit">Create Project</button>
          </form>

          <form id="line-form" class="form-card tab-pane" data-tab-pane="line">
            <label class="field-label">Organization
              <select name="organization_id" required></select>
            </label>
            <label class="field-label">Branch
              <select name="branch_id" required></select>
            </label>
            <label class="field-label">Project
              <select name="project_id" required></select>
            </label>
            <label class="field-label">Line name
              <input name="name" placeholder="e.g. Line A" required />
            </label>
            <label class="field-label">Line code
              <input name="code" placeholder="e.g. L-A" required />
            </label>
            <button class="btn primary" type="submit">Create Line</button>
          </form>

          <form id="station-form" class="form-card tab-pane" data-tab-pane="station">
            <label class="field-label">Organization
              <select name="organization_id" required></select>
            </label>
            <label class="field-label">Branch
              <select name="branch_id" required></select>
            </label>
            <label class="field-label">Project
              <select name="project_id" required></select>
            </label>
            <label class="field-label">Line
              <select name="line_id" required></select>
            </label>
            <label class="field-label">Station name
              <input name="name" placeholder="e.g. Station 01" required />
            </label>
            <label class="field-label">Station code
              <input name="code" placeholder="e.g. ST01" required />
            </label>
            <button class="btn primary" type="submit">Create Station</button>
          </form>

          <form id="user-form" class="form-card tab-pane" data-tab-pane="user">
            <label class="field-label">Username
              <input name="username" placeholder="e.g. jsmith" required />
            </label>
            <label class="field-label">Password
              <input name="password" placeholder="Min. 8 characters" type="password" required />
            </label>
            <label class="field-label">User group
              <input name="user_group" placeholder="e.g. Engineering" required />
            </label>
            <label class="field-label">Role
              <select name="role" required>
                <option value="admin">Admin</option>
                <option value="engineer">Engineer</option>
              </select>
            </label>
            <label class="field-label">Organization
              <select name="organization_id"></select>
            </label>
            <label class="field-label">Branch
              <select name="branch_id"></select>
            </label>
            <label class="field-label">Project
              <select name="project_id"></select>
            </label>
            <label class="field-label">Line
              <select name="line_id"></select>
            </label>
            <label class="field-label">Station
              <select name="station_id"></select>
            </label>
            <button class="btn primary" type="submit">Create User</button>
          </form>

          <form id="device-form" class="form-card tab-pane" data-tab-pane="device">
            <label class="field-label">Device name
              <input name="name" placeholder="e.g. Torque Driver A" required />
            </label>
            <label class="field-label">Device code
              <input name="device_code" placeholder="e.g. TD-A" required />
            </label>
            <label class="field-label">Organization
              <select name="organization_id" required></select>
            </label>
            <label class="field-label">Branch
              <select name="branch_id" required></select>
            </label>
            <label class="field-label">Project
              <select name="project_id" required></select>
            </label>
            <label class="field-label">Line
              <select name="line_id" required></select>
            </label>
            <label class="field-label">Station
              <select name="station_id" required></select>
            </label>
            <button class="btn primary" type="submit">Map Device to Station</button>
          </form>

        </div>
        <p id="create-status" class="status"></p>
      </section>

      <section class="panel" id="tree-panel">
        <div class="panel-head">
          <h2>Hierarchy</h2>
          <button id="refresh-tree-btn" class="btn ghost sm" type="button">↻ Refresh</button>
        </div>
        <div id="tree-view" class="tree-view"></div>
        <div class="panel-subhead">
          <h3>Users</h3>
        </div>
        <div id="users-view" class="users-list"></div>
      </section>

    </main>
  </div>

  <!-- Edit record modal -->
  <dialog id="edit-modal" class="edit-modal">
    <div class="edit-modal-inner">
      <div class="edit-modal-head">
        <h2 id="edit-modal-title" class="edit-modal-title">Edit</h2>
        <button id="edit-modal-close" class="btn ghost sm" type="button" aria-label="Close">✕</button>
      </div>
      <form id="edit-form">
        <div id="edit-modal-fields" class="edit-modal-fields"></div>
        <p id="edit-modal-status" class="status"></p>
        <div class="edit-modal-footer">
          <button class="btn ghost sm" type="button" id="edit-cancel-btn">Cancel</button>
          <button class="btn primary sm" type="submit">Save changes</button>
        </div>
      </form>
    </div>
  </dialog>

  <script src="/static/admin.js"></script>
</body>
</html>
