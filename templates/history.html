<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History – SAGS</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    html, body {
      height: auto; overflow-y: auto; overflow-x: clip;
      background-color: #f7f8fa;
      background-image: linear-gradient(rgba(35,38,41,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(35,38,41,.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .hist-page { margin: 48px auto; padding: 0 24px 80px; box-sizing: border-box; width: 100%; max-width: 100vw; }

    /* ── Search card ── */
    .hist-search-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 24px 28px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 24px;
    }
    .hist-search-card h2 { margin: 0 0 16px; font-size: 1.1rem; font-weight: 700; color: #232629; }
    .hist-search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }

    .hist-field { display: flex; flex-direction: column; gap: 4px; }
    .hist-field label { font-size: .78rem; font-weight: 700; color: #4b5b76; }
    .hist-field select, .hist-field input[type="text"] {
      padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px;
      font-size: .9rem; color: #232629; background: #f8fafc;
      min-width: 160px;
    }
    .hist-field select:focus, .hist-field input:focus {
      outline: none; border-color: #FF7733; box-shadow: 0 0 0 3px rgba(255,119,51,.15);
    }
    .hist-field input[type="text"] { min-width: 280px; }

    #hist-status { font-size: .83rem; margin-top: 10px; min-height: 18px; }
    #hist-status.ok    { color: #16a34a; }
    #hist-status.error { color: #dc2626; }

    /* ── Results card ── */
    .hist-results-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 24px 28px 0; box-shadow: 0 2px 8px rgba(0,0,0,.06);
      box-sizing: border-box; width: 100%; min-width: 0;
    }
    .hist-results-card h2 { margin: 0 0 16px; font-size: 1rem; font-weight: 700; color: #232629; }

    /* ── Assy table ── */
    .hist-table-wrap {
      display: block;
      width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 65vh;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    table.hist-table { border-collapse: collapse; font-size: .8rem; width: max-content; min-width: 100%; }
    .hist-table th {
      position: sticky; top: 0; z-index: 1;
      text-align: left; font-size: .72rem; font-weight: 700; color: #6b7a95;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 7px 10px; border-bottom: 2px solid #e2e8f0;
      background: #f8fafc; white-space: nowrap;
    }
    .hist-table td {
      padding: 8px 10px; border-bottom: 1px solid #f1f5f9;
      color: #232629; max-width: 220px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hist-table tr:hover td { background: #fafafa; }
    .hist-table td:hover { white-space: normal; word-break: break-all; max-width: none; }

    /* ── Conduit side-by-side ── */
    .hist-conduit-results { display: flex; flex-direction: column; gap: 24px; }

    .hist-conduit-item {
      border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden;
    }
    .hist-conduit-header {
      background: #232629; color: #fff; padding: 10px 16px;
      font-size: .85rem; font-weight: 700; display: flex; align-items: center; gap: 8px;
    }
    .hist-conduit-header .serial-badge {
      background: #FF7733; color: #fff; padding: 2px 10px;
      border-radius: 20px; font-size: .78rem; font-weight: 800;
    }
    .hist-conduit-panes {
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .hist-conduit-pane {
      padding: 14px 16px; border-right: 1px solid #e2e8f0;
    }
    .hist-conduit-pane:last-child { border-right: none; }
    .hist-pane-title {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .07em; color: #FF7733; margin-bottom: 8px;
    }
    .hist-json-view {
      background: #1e2028; color: #e2e8f0; padding: 12px 14px;
      border-radius: 8px; font-family: 'Fira Mono', 'Consolas', monospace;
      font-size: .74rem; line-height: 1.55; overflow: auto; max-height: 400px;
      white-space: pre-wrap; word-break: break-word;
    }
    .hist-json-empty {
      color: #8c97ad; font-size: .8rem; font-style: italic; padding: 8px 0;
    }

    /* JSON syntax coloring */
    .jk { color: #79aaff; }  /* key */
    .jv { color: #9fe2bf; }  /* string value */
    .jn { color: #ffb86c; }  /* number */
    .jb { color: #ff79c6; }  /* boolean */
    .jnull { color: #bd93f9; }

    .hist-no-results {
      text-align: center; padding: 40px; color: #6b7a95; font-size: .9rem;
    }

    @media (max-width: 680px) {
      .hist-conduit-panes { grid-template-columns: 1fr; }
      .hist-conduit-pane { border-right: none; border-bottom: 1px solid #e2e8f0; }
    }
  </style>
</head>
<body>
  <nav class="app-nav">
    <div class="app-brand">
      <div class="app-logo">PE</div>
      <div>
        <span class="app-name">Interactive Smart Assembly Guidance System</span>
        <span class="app-tagline">· MVIIS ·</span>
      </div>
    </div>
    <ul class="app-nav-links">
      <li><a class="app-nav-link" href="/recipe-management">Recipes</a></li>
      <li><a class="app-nav-link" href="/configure">Kitchen</a></li>
      <li><a class="app-nav-link is-active" href="/history">History</a></li>
      <li><a class="app-nav-link" href="/system-settings">System</a></li>
    </ul>
  </nav>

  <div class="hist-page">
    <!-- Search card -->
    <div class="hist-search-card">
      <h2>Log History Search</h2>
      <div class="hist-search-row">
        <div class="hist-field">
          <label for="hist-log-type">Log Type</label>
          <select id="hist-log-type">
            <option value="conduit">Conduit Log</option>
            <option value="assy">Assembly Log</option>
          </select>
        </div>
        <div class="hist-field">
          <label for="hist-query">Search Serial #</label>
          <input type="text" id="hist-query" placeholder="Enter serial number or value…" />
        </div>
        <button id="hist-search-btn" class="primary" type="button">Search</button>
      </div>
      <p id="hist-status"></p>
    </div>

    <!-- Results card -->
    <div class="hist-results-card" id="hist-results-card" hidden>
      <h2 id="hist-results-title">Results</h2>
      <div id="hist-results-body"></div>
    </div>
  </div>

  <div id="app-loader" style="position:fixed;inset:0;z-index:9999;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;">
    <div style="font-size:2rem;font-weight:800;color:#232629;letter-spacing:-.5px;">Interactive Smart Assembly Guidance System</div>
    <div style="margin-top:10px;color:#232629;opacity:.55;font-size:1rem;">· MVIIS ·</div>
    <div style="margin-top:24px;width:40px;height:40px;border:4px solid rgba(35,38,41,.15);border-top-color:#FF7733;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <footer style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:#232629;color:rgba(255,255,255,.55);font-size:.7rem;text-align:center;padding:.45rem 1rem;letter-spacing:.02em;">
    Solution developed &amp; created by <strong style="color:#FF7733;">Melvin</strong> &amp; <strong style="color:#FF7733;">Venfra Innovative Industrial Solutions</strong> &mdash; MVIIS &copy; 2021
  </footer>
  <script src="/static/history.js"></script>
  <script src="/static/nav_loader.js"></script>
  <script src="/static/idle_logout.js"></script>
</body>
</html>
